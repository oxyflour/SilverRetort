<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>SilverRetort</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #070b12;
        --bg-1: #0f1726;
        --bg-2: #172338;
        --silver-0: #f4f7fb;
        --silver-1: #c5cfdd;
        --silver-2: #8794a8;
        --accent: #74e1f6;
        --accent-soft: rgba(116, 225, 246, 0.22);
        --text: rgba(244, 247, 251, 0.96);
        --muted: rgba(197, 207, 221, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(116, 225, 246, 0.14), transparent 32%),
          radial-gradient(circle at 82% 18%, rgba(244, 247, 251, 0.1), transparent 28%),
          linear-gradient(145deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
        color: var(--text);
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .shell {
        display: grid;
        justify-items: center;
        gap: 16px;
        padding: 40px 32px;
        text-align: center;
      }

      .emblem {
        position: relative;
        display: grid;
        place-items: center;
        width: 148px;
        height: 148px;
      }

      .emblem::before,
      .emblem::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      .emblem::before {
        background: radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.12), transparent 45%);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 20px 50px rgba(0, 0, 0, 0.35),
          0 0 40px rgba(116, 225, 246, 0.14);
      }

      .emblem::after {
        inset: 12px;
        border: 1px solid rgba(197, 207, 221, 0.18);
      }

      .orbit {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 1px solid transparent;
      }

      .orbit-a {
        border-top-color: rgba(244, 247, 251, 0.46);
        border-right-color: rgba(116, 225, 246, 0.38);
        animation: spin 4.2s linear infinite;
      }

      .orbit-b {
        inset: 10px;
        border-bottom-color: rgba(244, 247, 251, 0.28);
        border-left-color: rgba(116, 225, 246, 0.22);
        animation: spin-reverse 3.2s linear infinite;
      }

      .mark {
        position: relative;
        width: 104px;
        height: 104px;
        animation: float 2.8s ease-in-out infinite;
      }

      .title {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .subtitle {
        font-size: 13px;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .status {
        position: relative;
        width: min(280px, 65vw);
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(197, 207, 221, 0.12);
      }

      .status::after {
        content: "";
        position: absolute;
        inset: 0 auto 0 -35%;
        width: 35%;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        animation: sweep 1.4s ease-in-out infinite;
      }

      .glass {
        fill: none;
        stroke: url(#silver);
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .accent-dot {
        fill: var(--accent);
        filter: drop-shadow(0 0 10px var(--accent-soft));
        animation: pulse 1.8s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-reverse {
        to {
          transform: rotate(-360deg);
        }
      }

      @keyframes float {
        50% {
          transform: translateY(-4px);
        }
      }

      @keyframes pulse {
        50% {
          transform: scale(1.16);
          opacity: 0.9;
        }
      }

      @keyframes sweep {
        to {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-label="Application loading">
      <div class="emblem" aria-hidden="true">
        <div class="orbit orbit-a"></div>
        <div class="orbit orbit-b"></div>
        <svg class="mark" viewBox="0 0 120 120" fill="none">
          <defs>
            <linearGradient id="silver" x1="27" y1="26" x2="92" y2="91" gradientUnits="userSpaceOnUse">
              <stop stop-color="#F4F7FB" />
              <stop offset="0.46" stop-color="#CAD4E1" />
              <stop offset="1" stop-color="#8794A8" />
            </linearGradient>
          </defs>
          <circle class="glass" cx="47" cy="72" r="23" />
          <path class="glass" d="M62 57L90 29" />
          <circle class="accent-dot" cx="94" cy="25" r="6" />
          <circle class="accent-dot" cx="47" cy="72" r="7" />
        </svg>
      </div>
      <div class="title">SilverRetort</div>
      <div class="subtitle">Launching local services...</div>
      <div class="status" aria-hidden="true"></div>
    </main>
  </body>
</html>
