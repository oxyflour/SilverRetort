<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LeRobot Collision View</title><style>
*{box-sizing:border-box}html,body,#viewport{width:100%;height:100%;margin:0;overflow:hidden;background:#09111b;color:#d9e5ef;font:14px system-ui}#hud{position:fixed;z-index:2;top:16px;left:16px;padding:12px 14px;border:1px solid #294154;border-radius:10px;background:#0b1724dd;box-shadow:0 8px 30px #0008}strong{display:block;margin-bottom:5px;color:#fff}.dot{display:inline-block;width:8px;height:8px;margin-right:7px;border-radius:50%;background:#f3b33d}.live .dot{background:#42d392;box-shadow:0 0 9px #42d392}.error .dot{background:#ef6461}small{display:block;margin-top:4px;color:#87a2b8}</style></head>
<body><div id="hud"><strong>LeRobot collision view</strong><span id="state"><i class="dot"></i><span>Connecting…</span></span><small id="detail">Waiting for /tf</small></div><div id="viewport"></div><script src="/app.js"></script></body></html>
