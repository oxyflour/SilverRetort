
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitsuba 3 Path Tracer — Heightfield</title>
<script src="/artifact-bridge-v1.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: system-ui, sans-serif; }
#container { position: relative; width: 100%; height: 100%; }
video { display: block; width: 100%; height: 100%; object-fit: contain; cursor: grab; }
video.dragging { cursor: grabbing; }
#overlay {
  position: absolute; bottom: 12px; right: 12px;
  background: rgba(0,0,0,0.75); color: #fff;
  padding: 8px 14px; border-radius: 6px;
  font-size: 13px; line-height: 1.5;
  pointer-events: none; user-select: none;
  z-index: 10;
}
#overlay .spp { font-weight: bold; }
#overlay .spp.reset { color: #ff6b6b; }
#overlay .spp.live { color: #ff6b6b; }
#overlay .spp.accum { color: #51cf66; }
#status {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #aaa; font-size: 18px; z-index: 20; pointer-events: none;
}
#info-bar {
  position: absolute; bottom: 8px; left: 8px; right: 8px;
  display: flex; gap: 12px; justify-content: center;
  pointer-events: none; user-select: none; z-index: 10;
}
#info-bar span {
  background: rgba(0,0,0,0.55); color: #ccc;
  padding: 3px 8px; border-radius: 4px; font-size: 11px;
}

/* --- Control panel --- */
#panel {
  position: absolute; top: 12px; left: 12px; z-index: 30;
  background: rgba(20,20,26,0.92); color: #ddd;
  padding: 14px 16px; border-radius: 8px;
  font-size: 13px; min-width: 220px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: opacity 0.2s;
}
#panel.collapsed .panel-body { display: none; }
#panel-toggle {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none; margin-bottom: 4px;
}
#panel-toggle h3 { font-size: 13px; font-weight: 600; margin: 0; color: #aaa; }
#panel-toggle .arrow { font-size: 16px; color: #888; transition: transform 0.2s; }
#panel.collapsed #panel-toggle .arrow { transform: rotate(-90deg); }

.ctrl-row { margin-bottom: 8px; }
.ctrl-row label {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 2px; font-size: 11px; color: #999;
}
.ctrl-row label .val { color: #fff; font-weight: 600; font-size: 12px; min-width: 55px; text-align: right; }
.ctrl-row .slider-wrap { display: flex; align-items: center; gap: 6px; }
.ctrl-row input[type="range"] {
  flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
  background: #444; border-radius: 2px; outline: none;
}
.ctrl-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: #7eb8da; cursor: pointer; border: none;
}
.ctrl-row input[type="number"] {
  width: 52px; background: rgba(255,255,255,0.08); border: 1px solid #444;
  color: #fff; font-size: 11px; padding: 2px 4px; border-radius: 3px;
  text-align: right;
}
.ctrl-row input[type="number"]:focus { outline: none; border-color: #7eb8da; }

#btn-reset {
  margin-top: 6px; width: 100%; padding: 5px 0;
  background: rgba(255,255,255,0.08); border: 1px solid #444; color: #aaa;
  border-radius: 4px; font-size: 11px; cursor: pointer;
}
#btn-reset:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* --- Heightfield preview --- */
#preview-wrap {
  margin-top: 10px; position: relative; cursor: grab;
  border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
  overflow: hidden; line-height: 0;
}
#preview-wrap.dragging { cursor: grabbing; }
#preview-wrap img { display: block; width: 100%; image-rendering: pixelated; }
#preview-info {
  font-size: 10px; color: #666; text-align: center;
  margin: 2px 0 0 0; pointer-events: none;
}

/* --- Preview overlay (top-right) --- */
#preview-overlay {
  position: absolute; top: 12px; right: 12px; z-index: 20;
  max-width: 140px;
  background: rgba(20,20,26,0.85);
  padding: 4px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
}
#preview-overlay #preview-wrap {
  margin-top: 0; border-radius: 4px;
}
#preview-overlay #preview-info {
  color: #999; font-size: 9px; margin: 2px 0 0 0;
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>

  <div id="overlay"><span class="spp reset" id="spp-text">SPP: connecting...</span></div>

  <div id="preview-overlay">
    <div id="preview-wrap"><img id="preview-img" src="" alt="heightfield preview"></div>
    <p id="preview-info">&#216; 0 &#215; 0 mm</p>
  </div>

  <div id="status">Connecting to render server...</div>

  <div id="info-bar">
    <span>Drag: rotate</span>
    <span>Shift+Drag: pan</span>
    <span>Scroll: zoom</span>
    <span id="res-text"></span>
  </div>

  <!-- Panel: header is static, sliders are built dynamically from /params -->
  <div id="panel">
    <div id="panel-toggle" onclick="togglePanel()">
      <h3>Heightfield</h3>
      <span class="arrow">&#9660;</span>
    </div>
    <div class="panel-body">
      <div id="sliders-container"></div>
      <button id="btn-reset" onclick="resetScene()">Reset defaults</button>
    </div>
  </div>
</div>

<script>
// ======================================================================
// Helper
// ======================================================================
function e(id) { return document.getElementById(id); }

// ======================================================================
// Scene spec — built dynamically from /params
// ======================================================================
let sceneSpec = { heightfield: {}, envmap: "studio/studio_envmap.exr" };
let DEFAULT_SCENE_SPEC = null;  // set by buildPanel()
let allParams = [];             // PARAMS list from server

// ======================================================================
// DOM refs
// ======================================================================
const video = document.getElementById('video');
const sppText = document.getElementById('spp-text');
const statusEl = document.getElementById('status');
const resText = document.getElementById('res-text');

// ======================================================================
// Panel toggle
// ======================================================================
function togglePanel() {
  e('panel').classList.toggle('collapsed');
}

// ======================================================================
// Fetch /params and dynamically build sliders
// ======================================================================
async function fetchParams() {
  try {
    const resp = await fetch('params');
    allParams = await resp.json();
    buildPanel(allParams);
  } catch(err) {
    console.error('Failed to fetch /params:', err);
    // Fallback: try connecting anyway with whatever sceneSpec we have
  }
}

function buildPanel(params) {
  const container = document.getElementById('sliders-container');
  container.innerHTML = '';

  // Build default spec from param defaults
  const hfDefaults = {};
  for (const p of params) {
    hfDefaults[p.internal_name] = p.default * p.internal_scale;
  }
  DEFAULT_SCENE_SPEC = {
    heightfield: { ...hfDefaults, fd_step: 0.000001, reflectance: [0.95, 0.95, 0.95] },
    envmap: "studio/studio_envmap.exr"
  };
  // Init sceneSpec from defaults
  sceneSpec = JSON.parse(JSON.stringify(DEFAULT_SCENE_SPEC));

  // Create slider rows
  for (const p of params) {
    const row = document.createElement('div');
    row.className = 'ctrl-row';

    const displayVal = p.default;
    const displayStep = p.step || 1;

    row.innerHTML =
      '<label>' + p.label +
      ' <span class="val" id="val-' + p.name + '">' + displayVal + '</span> ' + (p.unit || '') +
      '</label>' +
      '<div class="slider-wrap">' +
      '<input type="range" id="slider-' + p.name + '" min="' + p.min + '" max="' + p.max +
      '" value="' + displayVal + '" step="' + displayStep + '">' +
      '<input type="number" id="num-' + p.name + '" value="' + displayVal +
      '" step="' + displayStep + '" min="' + p.min + '" max="' + p.max + '">' +
      '</div>';

    container.appendChild(row);

    // Attach event listeners (after DOM insertion)
    const slider = row.querySelector('input[type=range]');
    const num = row.querySelector('input[type=number]');
    slider.addEventListener('input', function() { onParamChange(p.name, 'slider'); });
    num.addEventListener('change', function() { onParamChange(p.name, 'number'); });
  }
}

// ======================================================================
// Universal param change handler
// ======================================================================
function onParamChange(name, source) {
  const slider = e('slider-' + name);
  const num = e('num-' + name);
  const valEl = e('val-' + name);
  const param = allParams.find(function(p) { return p.name === name; });
  if (!param) return;

  let displayVal;
  if (source === 'slider') {
    displayVal = parseFloat(slider.value);
    num.value = displayVal;
  } else {
    displayVal = parseFloat(num.value) || param.default;
    displayVal = Math.max(param.min, Math.min(param.max, displayVal));
    num.value = displayVal;
    slider.value = displayVal;
  }

  valEl.textContent = displayVal;

  // Convert display value to internal (meters, etc.)
  const internalVal = displayVal * param.internal_scale;
  sceneSpec.heightfield[param.internal_name] = internalVal;

  scheduleScenePost();
}

// ======================================================================
// Sync all UI from current sceneSpec
// ======================================================================
function syncUIFromSpec() {
  for (const p of allParams) {
    const internalVal = sceneSpec.heightfield[p.internal_name];
    if (internalVal === undefined) continue;
    const displayVal = Math.round(internalVal / p.internal_scale);
    const slider = e('slider-' + p.name);
    const num = e('num-' + p.name);
    const valEl = e('val-' + p.name);
    if (slider) slider.value = displayVal;
    if (num) num.value = displayVal;
    if (valEl) valEl.textContent = displayVal;
  }
  renderPreview();
}

// ======================================================================
// Reset to defaults
// ======================================================================
function resetScene() {
  sceneSpec = JSON.parse(JSON.stringify(DEFAULT_SCENE_SPEC));
  syncUIFromSpec();
  scheduleScenePost();
}

// ======================================================================
// Heightfield preview — fetched from GET /preview
// ======================================================================
let previewCenterX = 0.0;
let previewCenterY = 0.0;
let previewSpan = 0.002;  // 2 mm
let previewVersion = 0;

function renderPreview() {
  const img = e("preview-img");
  if (!img) return;
  const hf = sceneSpec.heightfield;
  const period = hf.period;
  const hmax = hf.hmax;
  const rs = hf.rotation_speed || 0;
  const jit = hf.jitter !== undefined ? hf.jitter : 0.5;
  const hm = hf.hmin_scale !== undefined ? hf.hmin_scale : 0.15;
  const sd = hf.seed !== undefined ? hf.seed : 42;
  const span = previewSpan;
  const cx = previewCenterX;
  const cy = previewCenterY;
  previewVersion++;
  const url = "preview?period=" + period + "&hmax=" + hmax
    + "&rotation_speed=" + rs
    + "&jitter=" + jit
    + "&hmin_scale=" + hm
    + "&seed=" + sd
    + "&center_x=" + cx + "&center_y=" + cy
    + "&size_mm=" + (span * 1000)
    + "&v=" + previewVersion;
  img.src = url;

  e("preview-info").textContent =
    "\u00d8 " + (span * 1000).toFixed(1) + " \u00d7 " + (span * 1000).toFixed(1) + " mm";
}

// Preview drag/zoom
(function initPreview() {
  let prevDragging = false;
  let prevDragStart = { x: 0, y: 0 };
  let prevStartCX = 0;
  let prevStartCY = 0;

  const wrap = document.getElementById("preview-wrap");
  if (!wrap) return;
  wrap.addEventListener("pointerdown", function(ev) {
    prevDragging = true;
    prevDragStart = { x: ev.clientX, y: ev.clientY };
    prevStartCX = previewCenterX;
    prevStartCY = previewCenterY;
    wrap.classList.add("dragging");
    ev.target.setPointerCapture(ev.pointerId);
    ev.preventDefault();
    ev.stopPropagation();
  });
  wrap.addEventListener("pointermove", function(ev) {
    if (!prevDragging) return;
    var dx = ev.clientX - prevDragStart.x;
    var dy = ev.clientY - prevDragStart.y;
    var scale = previewSpan / 128;
    previewCenterX = prevStartCX - dx * scale;
    previewCenterY = prevStartCY - dy * scale;
    renderPreview();
  });
  wrap.addEventListener("pointerup", function() {
    prevDragging = false;
    wrap.classList.remove("dragging");
  });
  wrap.addEventListener("wheel", function(ev) {
    ev.preventDefault();
    ev.stopPropagation();
    var factor = ev.deltaY > 0 ? 1.2 : 0.8;
    previewSpan = Math.max(0.0002, Math.min(0.02, previewSpan * factor));
    renderPreview();
  }, { passive: false });
})();

// ======================================================================
// WebRTC
// ======================================================================
let pc = null;
let dc = null;

async function connect() {
  statusEl.textContent = 'Creating peer connection...';
  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });
  pc.addTransceiver('video', { direction: 'recvonly' });

  dc = pc.createDataChannel('stats');
  dc.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.total_spp !== undefined) {
      if (!cameraDirty && !sceneDirty && !interactiveMode) {
        totalSpp = msg.total_spp;
        updateSppDisplay();
      }
    }
  };

  pc.ontrack = function(event) {
    statusEl.textContent = '';
    video.srcObject = event.streams[0];
    video.classList.remove('hidden');
    updateResolution();
    statusEl.classList.add('hidden');
  };
  pc.onconnectionstatechange = function() {
    if (pc.connectionState === 'connected') updateResolution();
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      statusEl.classList.remove('hidden');
      statusEl.textContent = 'Connection lost. Retrying...';
      setTimeout(connect, 2000);
    }
  };
  var offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  var resp = await fetch('offer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type })
  });
  var answer = await resp.json();
  await pc.setRemoteDescription(new RTCSessionDescription(answer));

  // Sync scene spec from server
  try {
    var sr = await fetch('scene');
    var serverSpec = await sr.json();
    if (serverSpec && serverSpec.heightfield) {
      sceneSpec = serverSpec;
      syncUIFromSpec();
    }
  } catch(e) {}
}

// ======================================================================
// Camera controls
// ======================================================================
let azimuth = 0.0;
let elevation = 0.524;
let distance = 0.40;
let target = [0, 0.001, 0];
let totalSpp = 0;
let dragging = false;
let dragStart = { x: 0, y: 0 };
let dragStartAz = 0;
let dragStartEl = 0;
let dragStartTarget = null;
let cameraDirty = false;
let lastCameraPost = 0;
const DEBOUNCE_MS = 60;
let interactiveMode = false;
let wheelTimeout = null;

function updateResolution() {
  var w = Math.round(video.videoWidth || video.clientWidth || 640);
  var h = Math.round(video.videoHeight || video.clientHeight || 480);
  if (w > 0 && h > 0) {
    resText.textContent = w + '\u00d7' + h;
    fetch('config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ width: w, height: h })
    });
  }
}

function sendCamera() {
  if (dc && dc.readyState === 'open') {
    dc.send(JSON.stringify({ type: 'camera', azimuth: azimuth, elevation: elevation, distance: distance, target: target }));
  }
}

let camDebounce = null;
function scheduleCameraPost() {
  cameraDirty = true;
  updateSppDisplay();
  if (camDebounce) clearTimeout(camDebounce);
  var delay = Math.max(0, DEBOUNCE_MS - (Date.now() - lastCameraPost));
  camDebounce = setTimeout(function() {
    if (cameraDirty) {
      cameraDirty = false;
      sendCamera();
    }
  }, delay);
}

video.addEventListener('pointerdown', function(e) {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragStartAz = azimuth;
  dragStartEl = elevation;
  dragStartTarget = target.slice();
  video.classList.add('dragging');
  video.setPointerCapture(e.pointerId);
  enterInteractive();
});

video.addEventListener('pointermove', function(e) {
  if (!dragging) return;
  var dx = e.clientX - dragStart.x;
  var dy = e.clientY - dragStart.y;

  if (e.shiftKey) {
    // Pan
    var dx_w = dx / video.clientWidth * distance * 0.8;
    var dy_w = dy / video.clientHeight * distance * 0.8;
    var ca = Math.cos(azimuth);
    var sa = Math.sin(azimuth);
    var ce = Math.cos(elevation);
    var se = Math.sin(elevation);
    var right = [ca, 0, -sa];
    var up = [-sa * se, ce, -ca * se];
    target = [
      dragStartTarget[0] - dx_w * right[0] + dy_w * up[0],
      dragStartTarget[1] - dx_w * right[1] + dy_w * up[1],
      dragStartTarget[2] - dx_w * right[2] + dy_w * up[2],
    ];
  } else {
    // Rotate
    azimuth = dragStartAz - dx * 0.005;
    elevation = Math.max(-1.5, Math.min(1.5, dragStartEl + dy * 0.005));
  }
  scheduleCameraPost();
});

video.addEventListener('pointerup', function() {
  dragging = false;
  video.classList.remove('dragging');
  exitInteractive();
});

video.addEventListener('wheel', function(e) {
  e.preventDefault();
  distance = Math.max(0.05, Math.min(5.0, distance * (e.deltaY > 0 ? 1.1 : 0.9)));
  scheduleCameraPost();
  enterInteractive();
}, { passive: false });

function enterInteractive() {
  interactiveMode = true;
  updateSppDisplay();
  if (wheelTimeout) { clearTimeout(wheelTimeout); wheelTimeout = null; }
  wheelTimeout = setTimeout(exitInteractive, 1000);
}

function exitInteractive() {
  interactiveMode = false;
  updateSppDisplay();
  if (wheelTimeout) { clearTimeout(wheelTimeout); wheelTimeout = null; }
}

// ======================================================================
// Scene update (POST to /scene)
// ======================================================================
let sceneDirty = false;
let sceneDebounce = null;
const SCENE_DEBOUNCE_MS = 250;

function scheduleScenePost() {
  sceneDirty = true;
  updateSppDisplay();
  renderPreview();
  if (sceneDebounce) clearTimeout(sceneDebounce);
  sceneDebounce = setTimeout(async function() {
    if (sceneDirty) {
      sceneDirty = false;
      await fetch('scene', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sceneSpec)
      });
      // Let the next SPP update restore the display
    }
  }, SCENE_DEBOUNCE_MS);
}

// ======================================================================
// SPP display
// ======================================================================
function updateSppDisplay() {
  if (cameraDirty || sceneDirty || interactiveMode) {
    sppText.textContent = 'SPP: reset';
    sppText.className = 'spp reset';
  } else {
    sppText.textContent = 'SPP: ' + totalSpp;
    sppText.className = 'spp accum';
  }
}

// ======================================================================
// Bootstrap
// ======================================================================
fetchParams().then(function() { connect(); });
</script>
</body>
</html>
